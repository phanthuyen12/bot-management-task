[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.process_idle_timeout = 30s
clear_env = no

; Logs
access.log = /var/log/fpm-access.log
slowlog = /var/log/fpm-slow.log
slowlog.timeout = 10s
